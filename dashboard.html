<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#ffffff">
<title>S&P · Transaction Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #f5f5f5;
  --bg2:      #ffffff;
  --bg3:      #f0f0f0;
  --border:   #e0e0e0;
  --border2:  #d0d0d0;
  --text:     #111111;
  --text2:    #444444;
  --muted:    #888888;
  --muted2:   #aaaaaa;
  --black:    #111111;
  --green:    #1a9e6e;
  --green-bg: rgba(26,158,110,.09);
  --red:      #d94040;
  --red-bg:   rgba(217,64,64,.09);
  --yellow:   #c97d10;
  --yel-bg:   rgba(201,125,16,.09);
  --snp:      #111111;
  --mono:     'DM Mono', monospace;
  --sans:     'Plus Jakarta Sans', sans-serif;
  --radius:   6px;
  --shadow:   0 1px 4px rgba(0,0,0,.07), 0 4px 16px rgba(0,0,0,.04);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-size: 13px;
  min-height: 100vh;
}

/* ── Header ──────────────────────────────────── */
header {
  position: sticky; top: 0; z-index: 100;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  height: 56px;
  display: flex; align-items: center;
  padding: 0 24px; gap: 16px;
  box-shadow: 0 1px 0 var(--border);
}

.logo-wrap {
  display: flex; align-items: center; gap: 10px;
}
.logo-img { height: 22px; }
.logo-divider {
  width: 1px; height: 20px;
  background: var(--border2);
}
.logo-sub {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--muted);
  letter-spacing: .06em;
}

.header-gap { flex: 1; }

.live-pill {
  display: flex; align-items: center; gap: 6px;
  font-size: 11px; color: var(--muted);
  background: var(--bg3);
  border: 1px solid var(--border);
  padding: 4px 10px; border-radius: 99px;
  font-family: var(--mono);
}
.pulse {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--green);
  animation: pulse 2s ease-in-out infinite;
}
.pulse.off { background: var(--muted2); animation: none; }
.pulse.err { background: var(--red); animation: none; }

@keyframes pulse {
  0%,100% { opacity:1; box-shadow: 0 0 0 0 rgba(26,158,110,.4); }
  50%      { opacity:.7; box-shadow: 0 0 0 5px rgba(26,158,110,0); }
}

#countdown {
  font-size: 11px; color: var(--muted);
  font-family: var(--mono);
  font-variant-numeric: tabular-nums;
  min-width: 120px; text-align: right;
}

/* ── Config bar ─────────────────────────────── */
.config-bar {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 10px 24px;
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
}
.config-label {
  font-size: 11px; color: var(--muted); font-weight: 600;
  text-transform: uppercase; letter-spacing: .07em; white-space: nowrap;
}
.config-input {
  flex: 1; min-width: 260px;
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: var(--mono); font-size: 12px;
  padding: 7px 12px; border-radius: var(--radius);
  outline: none; transition: border-color .15s;
}
.config-input:focus { border-color: var(--black); }
.config-input::placeholder { color: var(--muted2); }

.btn-connect {
  background: var(--black); color: #fff;
  font-family: var(--sans); font-weight: 700; font-size: 12px;
  padding: 7px 18px; border: none;
  border-radius: var(--radius); cursor: pointer;
  transition: opacity .15s; white-space: nowrap;
}
.btn-connect:hover { opacity: .82; }

.btn-clear {
  background: transparent; color: var(--muted);
  font-family: var(--sans); font-weight: 600; font-size: 12px;
  padding: 7px 12px; border: 1px solid var(--border);
  border-radius: var(--radius); cursor: pointer;
  transition: all .15s; white-space: nowrap;
}
.btn-clear:hover { border-color: var(--red); color: var(--red); }

/* ── KPI strip ───────────────────────────────── */
.kpi-strip {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  border-bottom: 1px solid var(--border);
  background: var(--bg2);
}
.kpi {
  padding: 16px 24px;
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column; gap: 4px;
}
.kpi:last-child { border-right: none; }

.kpi-label {
  font-size: 10px; font-weight: 700;
  text-transform: uppercase; letter-spacing: .1em;
  color: var(--muted);
}
.kpi-value {
  font-family: var(--mono);
  font-size: 24px; font-weight: 500;
  color: var(--text);
  font-variant-numeric: tabular-nums;
}
.kpi-value.green { color: var(--green); }
.kpi-value.red   { color: var(--red); }

/* ── Main ────────────────────────────────────── */
.main { padding: 20px 24px; }

.toolbar {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 14px; flex-wrap: wrap;
}
.toolbar-title {
  font-weight: 700; font-size: 14px;
}
.tx-count {
  font-size: 11px; color: var(--muted);
  background: var(--bg3); border: 1px solid var(--border);
  padding: 2px 8px; border-radius: 99px;
  font-family: var(--mono);
}
.toolbar-gap { flex: 1; }

.filter-btn {
  font-family: var(--sans); font-size: 12px; font-weight: 600;
  padding: 5px 12px; border-radius: var(--radius);
  border: 1px solid var(--border);
  background: transparent; color: var(--muted);
  cursor: pointer; transition: all .15s;
}
.filter-btn:hover { border-color: var(--black); color: var(--black); }
.filter-btn.active { background: var(--black); border-color: var(--black); color: #fff; }
.filter-btn.green.active { background: var(--green-bg); border-color: var(--green); color: var(--green); }
.filter-btn.red.active   { background: var(--red-bg);   border-color: var(--red);   color: var(--red); }

/* ── Table ───────────────────────────────────── */
.table-wrap {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: var(--shadow);
}

table { width: 100%; border-collapse: collapse; }

thead th {
  padding: 10px 14px;
  text-align: left; font-size: 10px; font-weight: 700;
  color: var(--muted); text-transform: uppercase; letter-spacing: .1em;
  background: var(--bg3);
  border-bottom: 1px solid var(--border);
  white-space: nowrap; cursor: pointer; user-select: none;
  transition: color .15s;
}
thead th:hover { color: var(--black); }
thead th.sorted { color: var(--black); }
thead th.sorted::after { content: ' ↓'; }
thead th.sorted.asc::after { content: ' ↑'; }

tbody tr {
  border-bottom: 1px solid var(--border);
  cursor: pointer; transition: background .1s;
  animation: rowIn .25s ease both;
}
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: var(--bg3); }
tbody tr.flash { animation: flash .7s ease; }

@keyframes rowIn {
  from { opacity:0; transform: translateY(-3px); }
  to   { opacity:1; transform: translateY(0); }
}
@keyframes flash {
  0%   { background: rgba(26,158,110,.15); }
  100% { background: transparent; }
}

td {
  padding: 10px 14px; font-size: 12px;
  vertical-align: middle;
  white-space: nowrap; max-width: 200px;
  overflow: hidden; text-overflow: ellipsis;
  color: var(--text2);
}
td.accent { color: var(--text); font-weight: 600; }

.badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 8px; border-radius: 4px;
  font-size: 11px; font-weight: 700;
}
.b-approved { background: var(--green-bg); color: var(--green); }
.b-declined { background: var(--red-bg);   color: var(--red); }
.b-pending  { background: var(--yel-bg);   color: var(--yellow); }

.amount-val {
  font-family: var(--mono); font-weight: 500;
  font-size: 13px; color: var(--text);
}

.empty-state {
  padding: 60px 20px; text-align: center; color: var(--muted);
}
.empty-icon { font-size: 28px; margin-bottom: 10px; }
.empty-msg  { font-size: 14px; font-weight: 600; color: var(--text2); }
.empty-sub  { font-size: 11px; margin-top: 6px; font-family: var(--mono); }

/* ── Modal ───────────────────────────────────── */
.overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.35);
  backdrop-filter: blur(4px);
  z-index: 200;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity .2s;
}
.overlay.open { opacity:1; pointer-events:all; }

.modal {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 8px;
  width: 92%; max-width: 620px;
  max-height: 88vh; overflow-y: auto;
  transform: translateY(8px); transition: transform .2s;
  box-shadow: 0 20px 60px rgba(0,0,0,.15);
}
.overlay.open .modal { transform: translateY(0); }

.modal-head {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 12px;
}
.modal-title { font-weight: 700; font-size: 15px; flex: 1; }
.modal-x {
  background: none; border: none; color: var(--muted);
  font-size: 18px; cursor: pointer; padding: 4px 8px;
  border-radius: 4px; line-height: 1;
  transition: background .1s;
}
.modal-x:hover { background: var(--bg3); color: var(--text); }

.modal-body { padding: 20px; display: flex; flex-direction: column; gap: 16px; }

.dgrid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
}
@media(max-width:480px) { .dgrid { grid-template-columns: 1fr; } }

.ditem { display: flex; flex-direction: column; gap: 3px; }
.ditem label { font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; }
.dval {
  font-family: var(--mono); font-size: 12px;
  background: var(--bg3); border: 1px solid var(--border);
  padding: 7px 10px; border-radius: 4px;
  word-break: break-all; color: var(--text);
}
.dval.green { color: var(--green); }
.dval.red   { color: var(--red); }

.sec-label {
  font-size: 11px; font-weight: 700; color: var(--muted2);
  display: flex; align-items: center; gap: 8px;
  text-transform: uppercase; letter-spacing: .07em;
}
.sec-label::after { content:''; flex:1; height:1px; background: var(--border); }

.ticket-box {
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: 4px; padding: 12px;
  font-family: var(--mono); font-size: 11px; line-height: 1.9;
  white-space: pre-wrap; color: var(--text2);
  max-height: 200px; overflow-y: auto;
}

/* ── Toast ───────────────────────────────────── */
#toast {
  position: fixed; bottom: 20px; right: 20px;
  background: var(--bg2); border: 1px solid var(--border);
  padding: 10px 16px; border-radius: var(--radius);
  font-size: 12px; z-index: 500; font-family: var(--mono);
  box-shadow: var(--shadow);
  transform: translateY(60px); opacity: 0; transition: all .3s;
}
#toast.show { transform: translateY(0); opacity: 1; }
#toast.err  { border-color: var(--red); color: var(--red); }
#toast.ok   { border-color: var(--green); color: var(--green); }
</style>
</head>
<body>

<header>
  <div class="logo-wrap">
    <img class="logo-img" id="logoImg" src="" alt="Smile & Pay">
    <div class="logo-divider"></div>
    <span class="logo-sub">TRANSACTIONS</span>
  </div>
  <div class="header-gap"></div>
  <div class="live-pill">
    <div class="pulse off" id="pulseDot"></div>
    <span id="liveLabel">En attente</span>
  </div>
  <div id="countdown">—</div>
</header>

<div class="config-bar">
  <span class="config-label">Source CSV</span>
  <input class="config-input" id="csvUrl"
    placeholder="https://docs.google.com/spreadsheets/d/…/pub?output=csv">
  <button class="btn-connect" onclick="saveAndLoad()">Connecter</button>
  <button class="btn-clear"   onclick="clearHistory()">Effacer historique</button>
</div>

<div class="kpi-strip">
  <div class="kpi"><span class="kpi-label">Total</span><span class="kpi-value" id="kpiTotal">—</span></div>
  <div class="kpi"><span class="kpi-label">Approuvées</span><span class="kpi-value green" id="kpiApproved">—</span></div>
  <div class="kpi"><span class="kpi-label">Refusées</span><span class="kpi-value red" id="kpiDeclined">—</span></div>
  <div class="kpi"><span class="kpi-label">Volume</span><span class="kpi-value" id="kpiVolume">—</span></div>
  <div class="kpi"><span class="kpi-label">Dernière TX</span><span class="kpi-value" id="kpiLast" style="font-size:13px;padding-top:4px">—</span></div>
</div>

<div class="main">
  <div class="toolbar">
    <span class="toolbar-title">Transactions</span>
    <span class="tx-count" id="txCount">0</span>
    <div class="toolbar-gap"></div>
    <button class="filter-btn active" id="btnAll"      onclick="setFilter('ALL')">Toutes</button>
    <button class="filter-btn green"  id="btnApproved" onclick="setFilter('APPROVED')">Approuvées</button>
    <button class="filter-btn red"    id="btnDeclined" onclick="setFilter('DECLINED')">Refusées</button>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th onclick="sortBy('date')"          id="th-date">Date</th>
          <th onclick="sortBy('heure')"         id="th-heure">Heure</th>
          <th onclick="sortBy('transactionId')" id="th-transactionId">Transaction ID</th>
          <th onclick="sortBy('name')"          id="th-name">Nom</th>
          <th onclick="sortBy('private_data')"  id="th-private_data">Réf. privée</th>
          <th onclick="sortBy('ref_ipn')"       id="th-ref_ipn">Réf. IPN</th>
          <th onclick="sortBy('amount')"        id="th-amount">Montant</th>
          <th onclick="sortBy('status')"        id="th-status">Statut</th>
        </tr>
      </thead>
      <tbody id="txBody">
        <tr><td colspan="8"><div class="empty-state">
          <div class="empty-icon">📋</div>
          <div class="empty-msg">Configurer l'URL CSV Google Sheets</div>
          <div class="empty-sub">Fichier → Partager → Publier sur le web → CSV</div>
        </div></td></tr>
      </tbody>
    </table>
  </div>
</div>

<div class="overlay" id="overlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-head">
      <span class="modal-title" id="modalTitle">Détail</span>
      <button class="modal-x" onclick="closeModalDirect()">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<div id="toast"></div>

<script>
// ─── Logo inline (embarqué en base64 pour éviter les problèmes file://) ────
// On charge le logo S&P depuis le SVG text inline
(function() {
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 40">
    <text y="30" font-family="Georgia, serif" font-size="26" font-weight="bold" fill="#111">Smile&amp;Pay</text>
  </svg>`;
  const b64 = btoa(unescape(encodeURIComponent(svg)));
  document.getElementById('logoImg').src = 'data:image/svg+xml;base64,' + b64;
})();

// ─── State ────────────────────────────────────────────────────────────────
let allRows   = [];   // historique complet (localStorage + fetch)
let sortField = 'date';
let sortAsc   = false;
let filter    = 'ALL';
let refreshTimer, cdTimer;
let countdown = 0;
const INTERVAL  = 15;
const STORE_KEY = 'txboard_rows_v2';
const URL_KEY   = 'txboard_csv';

// ─── Persist / restore ────────────────────────────────────────────────────
function saveRows() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(allRows)); } catch(e) {}
}
function loadRows() {
  try {
    const s = localStorage.getItem(STORE_KEY);
    if (s) allRows = JSON.parse(s);
  } catch(e) { allRows = []; }
}

// ─── Config ───────────────────────────────────────────────────────────────
function loadConfig() {
  const url = localStorage.getItem(URL_KEY);
  if (url) {
    document.getElementById('csvUrl').value = url;
    loadRows();
    renderTable([]);
    updateKPIs();
    startPolling();
  }
}

function saveAndLoad() {
  const url = document.getElementById('csvUrl').value.trim();
  if (!url) { showToast('Entrer une URL CSV', 'err'); return; }
  localStorage.setItem(URL_KEY, url);
  startPolling();
}

function clearHistory() {
  allRows = [];
  saveRows();
  renderTable([]);
  updateKPIs();
  showToast('Historique effacé', 'ok');
}

// ─── Polling ──────────────────────────────────────────────────────────────
function startPolling() {
  clearInterval(refreshTimer);
  clearInterval(cdTimer);
  fetchData();
  cdTimer = setInterval(() => {
    countdown--;
    document.getElementById('countdown').textContent =
      countdown > 0 ? `Actualisation dans ${countdown}s` : '…';
    if (countdown <= 0) fetchData();
  }, 1000);
}

async function fetchData() {
  const url = document.getElementById('csvUrl').value.trim();
  if (!url) return;
  countdown = INTERVAL;

  const bust     = (url.includes('?') ? '&' : '?') + 't=' + Date.now();
  const direct   = url + bust;
  const proxy    = `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}&t=${Date.now()}`;
  const isFile   = location.protocol === 'file:';

  try {
    let csv;
    // En file:// on tente direct puis proxy
    if (isFile) {
      try {
        const r = await fetch(direct, {cache:'no-store'});
        if (!r.ok) throw 0;
        csv = await r.text();
      } catch {
        const r = await fetch(proxy);
        if (!r.ok) throw new Error(`Proxy HTTP ${r.status}`);
        csv = await r.text();
      }
    } else {
      const r = await fetch(direct, {cache:'no-store'});
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      csv = await r.text();
    }

    const newIds = mergeCSV(csv);
    renderTable(newIds);
    updateKPIs();
    saveRows();

    document.getElementById('pulseDot').className = 'pulse';
    document.getElementById('liveLabel').textContent = 'Live';
  } catch(e) {
    document.getElementById('pulseDot').className = 'pulse err';
    document.getElementById('liveLabel').textContent = 'Erreur';
    showToast('Fetch: ' + e.message, 'err');
  }
}

// ─── CSV Parser (gère les cellules multilignes) ───────────────────────────
function parseCSV(text) {
  // Normaliser les fins de ligne
  text = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n');

  const records = [];
  let i = 0, n = text.length;
  let headers = null;

  while (i < n) {
    const row = readCSVRow();
    if (row === null) break;
    if (row.length === 0) continue;
    if (!headers) {
      headers = row.map(h => h.trim().toLowerCase().replace(/\s+/g,'_'));
    } else {
      const obj = {};
      headers.forEach((h, idx) => { obj[h] = row[idx] || ''; });
      records.push(obj);
    }
  }
  return records;

  function readCSVRow() {
    if (i >= n) return null;
    const cols = [];
    while (i < n) {
      if (text[i] === '"') {
        // Cellule entre guillemets — peut contenir des sauts de ligne
        i++; // skip opening "
        let val = '';
        while (i < n) {
          if (text[i] === '"') {
            if (text[i+1] === '"') { val += '"'; i += 2; } // guillemet échappé
            else { i++; break; } // guillemet fermant
          } else {
            val += text[i++];
          }
        }
        cols.push(val);
      } else {
        // Cellule sans guillemets
        let val = '';
        while (i < n && text[i] !== ',' && text[i] !== '\n') {
          val += text[i++];
        }
        cols.push(val);
      }
      if (i >= n || text[i] === '\n') { i++; break; }
      if (text[i] === ',') { i++; } // prochain champ
    }
    return cols;
  }
}

// ─── Merge CSV → historique ───────────────────────────────────────────────
function mergeCSV(csvText) {
  const rows   = parseCSV(csvText);
  const newIds = [];

  // Index des rows existants par transactionId
  const existing = new Map(allRows.map(r => [r.transactionId, r]));

  rows.forEach(r => {
    const tid = r.transactionid || r.transaction_id || r.transactionId || '';
    if (!tid) return;

    const ticket  = r.ticket_client || r.ticketclient || '';
    const ref     = extractRef(ticket);
    const {date, heure} = extractDateHeure(ticket);
    const amount  = parseFloat(r.amount || 0);

    const enriched = {
      transactionId:   tid,
      name:            r.name || '',
      amount,
      private_data:    r.private_data || r.privatedata || '',
      status:          (r.status || '').toUpperCase(),
      isCompleted:     r.iscompleted === 'true' || r.iscompleted === 'TRUE',
      isPayed:         r.ispayed === 'true' || r.ispayed === 'TRUE',
      ticket_client:   ticket,
      ticket_merchant: r.ticket_merchant || r.ticketmerchant || '',
      ref_ipn:         ref,
      date,
      heure,
    };

    if (!existing.has(tid)) {
      newIds.push(tid);
      allRows.unshift(enriched); // nouvelles en tête
    } else {
      // Mettre à jour si statut a changé
      const old = existing.get(tid);
      if (old.status !== enriched.status) {
        Object.assign(old, enriched);
        newIds.push(tid); // re-flash si changement
      }
    }
  });

  return newIds;
}

// ─── Parsers ticket ───────────────────────────────────────────────────────
function extractRef(ticket) {
  if (!ticket) return '—';
  const m = ticket.match(/ref[:\s]+(\d{8,})/i);
  return m ? m[1] : '—';
}

function extractDateHeure(ticket) {
  if (!ticket) return {date:'—', heure:'—'};
  // "Le 20/03/2026 a 15:24:37" (avec ou sans accent sur à)
  const m = ticket.match(/Le\s+(\d{2}\/\d{2}\/\d{4})\s+[a\u00e0]\s+(\d{2}:\d{2}:\d{2})/i);
  if (m) return {date: m[1], heure: m[2]};
  const d = ticket.match(/(\d{2}\/\d{2}\/\d{4})/);
  const h = ticket.match(/(\d{2}:\d{2}:\d{2})/);
  return { date: d?d[1]:'—', heure: h?h[1]:'—' };
}

// ─── Render ───────────────────────────────────────────────────────────────
function renderTable(newIds) {
  const body = document.getElementById('txBody');
  const newSet = new Set(newIds);

  let rows = allRows;
  if (filter === 'APPROVED') rows = allRows.filter(r => r.status === 'APPROVED');
  if (filter === 'DECLINED') rows = allRows.filter(r => r.status === 'DECLINED');

  rows = [...rows].sort((a, b) => {
    let va = a[sortField] ?? '', vb = b[sortField] ?? '';
    if (sortField === 'amount') { va=+va; vb=+vb; }
    if (sortField === 'date')   { va=toSortKey(a); vb=toSortKey(b); }
    return (va < vb ? -1 : va > vb ? 1 : 0) * (sortAsc ? 1 : -1);
  });

  document.getElementById('txCount').textContent = rows.length;

  if (rows.length === 0) {
    body.innerHTML = `<tr><td colspan="8"><div class="empty-state">
      <div class="empty-icon">${filter!=='ALL'?'🔍':'📋'}</div>
      <div class="empty-msg">Aucune transaction${filter!=='ALL'?' pour ce filtre':''}</div>
    </div></td></tr>`;
    return;
  }

  body.innerHTML = rows.map((r, i) => {
    const isNew = newSet.has(r.transactionId);
    const bcls  = r.status==='APPROVED'?'b-approved':r.status==='DECLINED'?'b-declined':'b-pending';
    const short = r.transactionId ? r.transactionId.slice(0,12)+'…' : '—';
    const amt   = r.amount ? (r.amount/100).toFixed(2)+' €' : '—';
    return `<tr class="${isNew?'flash':''}" onclick="openModal(${i})"
              style="animation-delay:${Math.min(i,12)*15}ms">
      <td class="accent">${esc(r.date)}</td>
      <td style="color:var(--muted)">${esc(r.heure)}</td>
      <td style="font-family:var(--mono);font-size:11px" title="${esc(r.transactionId)}">${short}</td>
      <td>${esc(r.name)}</td>
      <td style="font-family:var(--mono)">${esc(r.private_data)||'—'}</td>
      <td style="font-family:var(--mono)">${esc(r.ref_ipn)}</td>
      <td><span class="amount-val">${amt}</span></td>
      <td><span class="badge ${bcls}">${r.status||'PENDING'}</span></td>
    </tr>`;
  }).join('');
}

function toSortKey(r) {
  if (!r.date || r.date==='—') return '00000000';
  const [d,m,y] = r.date.split('/');
  return `${y}${m}${d}${(r.heure||'').replace(/:/g,'')}`;
}

// ─── KPIs ─────────────────────────────────────────────────────────────────
function updateKPIs() {
  const app  = allRows.filter(r => r.status==='APPROVED');
  const dec  = allRows.filter(r => r.status==='DECLINED');
  const vol  = app.reduce((s,r) => s+(r.amount||0), 0);
  const last = allRows.find(r => r.date!=='—');

  document.getElementById('kpiTotal').textContent    = allRows.length;
  document.getElementById('kpiApproved').textContent = app.length;
  document.getElementById('kpiDeclined').textContent = dec.length;
  document.getElementById('kpiVolume').textContent   = (vol/100).toFixed(2)+' €';
  document.getElementById('kpiLast').textContent     =
    last ? `${last.date}\n${last.heure}` : '—';
}

// ─── Sort / Filter ────────────────────────────────────────────────────────
function sortBy(f) {
  if (sortField===f) sortAsc=!sortAsc; else { sortField=f; sortAsc=false; }
  document.querySelectorAll('thead th').forEach(th => {
    th.classList.remove('sorted','asc');
  });
  const el = document.getElementById('th-'+f);
  if (el) { el.classList.add('sorted'); if(sortAsc) el.classList.add('asc'); }
  renderTable([]);
}

function setFilter(f) {
  filter = f;
  ['All','Approved','Declined'].forEach(x => {
    document.getElementById('btn'+x).classList.toggle('active', f===x.toUpperCase()
      || (x==='All' && f==='ALL'));
  });
  renderTable([]);
}

// ─── Modal ────────────────────────────────────────────────────────────────
let modalRows = [];

function openModal(idx) {
  let rows = allRows;
  if (filter==='APPROVED') rows=allRows.filter(r=>r.status==='APPROVED');
  if (filter==='DECLINED') rows=allRows.filter(r=>r.status==='DECLINED');
  rows = [...rows].sort((a,b)=>{
    let va=a[sortField]??'',vb=b[sortField]??'';
    if(sortField==='amount'){va=+va;vb=+vb;}
    if(sortField==='date'){va=toSortKey(a);vb=toSortKey(b);}
    return (va<vb?-1:va>vb?1:0)*(sortAsc?1:-1);
  });
  modalRows = rows;
  const r = rows[idx]; if(!r) return;

  const scls = r.status==='APPROVED'?'green':r.status==='DECLINED'?'red':'';
  const amt  = r.amount?(r.amount/100).toFixed(2)+' €':'—';

  document.getElementById('modalTitle').textContent =
    'TX · '+(r.transactionId||'').slice(0,20)+'…';

  document.getElementById('modalBody').innerHTML = `
    <div class="dgrid">
      <div class="ditem"><label>Transaction ID</label><div class="dval">${esc(r.transactionId)}</div></div>
      <div class="ditem"><label>Statut</label><div class="dval ${scls}">${esc(r.status)}</div></div>
      <div class="ditem"><label>Montant</label><div class="dval">${amt}</div></div>
      <div class="ditem"><label>Nom</label><div class="dval">${esc(r.name)}</div></div>
      <div class="ditem"><label>Réf. privée (private_data)</label><div class="dval">${esc(r.private_data)||'—'}</div></div>
      <div class="ditem"><label>Réf. IPN ticket</label><div class="dval">${esc(r.ref_ipn)}</div></div>
      <div class="ditem"><label>Date</label><div class="dval">${esc(r.date)}</div></div>
      <div class="ditem"><label>Heure</label><div class="dval">${esc(r.heure)}</div></div>
      <div class="ditem"><label>isCompleted</label><div class="dval">${r.isCompleted}</div></div>
      <div class="ditem"><label>isPayed</label><div class="dval">${r.isPayed}</div></div>
    </div>
    ${r.ticket_client?`
    <div>
      <div class="sec-label">Ticket client</div>
      <div class="ticket-box">${esc(r.ticket_client)}</div>
    </div>`:''}
    ${r.ticket_merchant?`
    <div>
      <div class="sec-label">Ticket commerçant</div>
      <div class="ticket-box">${esc(r.ticket_merchant)}</div>
    </div>`:''}`;

  document.getElementById('overlay').classList.add('open');
}

function closeModal(e) {
  if (e.target===document.getElementById('overlay')) closeModalDirect();
}
function closeModalDirect() {
  document.getElementById('overlay').classList.remove('open');
}

// ─── Utils ────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s??'')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function showToast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = 'show '+(type||'');
  clearTimeout(window._tt);
  window._tt = setTimeout(()=>el.className='', 3000);
}

document.addEventListener('keydown', e => {
  if (e.key==='Escape') closeModalDirect();
});
